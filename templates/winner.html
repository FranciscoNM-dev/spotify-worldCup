<!DOCTYPE html>
<html>
  <head>
    <title>World Cupify</title>
    <link href="/static/styles.css" rel="stylesheet">
    <style>
      .content {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 1.5rem;
      }

      .winner-img {
        width: 300px;
        height: 300px;
        object-fit: cover;
        border-radius: 12px;
        border: 3px solid #1DB954;
      }

      .winner-name {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 2rem;
        color: white;
      }

      .play-again {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        background-color: #1DB954;
        color: white;
        border-radius: 24px;
        padding: 12px 32px;
        text-decoration: none;
        transition: opacity 0.2s;
      }

      .play-again:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <nav>
        <a href="/">World Cupify</a>
        <ul>
            <li><a href="/about">About</a></li>
            <li><a href="/privacy">Privacy Policy</a></li>
            <li><a href="/contact">Contact</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>
    <div class="content">
      <h1>And the winner is...</h1>
      <img class="winner-img" src="{{ winner.image }}" />
      <span class="winner-name">{{ winner.name }}</span>
      <a href="/new_game" class="play-again">Play again</a>
    </div>
    <script src="/static/confetti.js"></script>
  </body>
</html>
